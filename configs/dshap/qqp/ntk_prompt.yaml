disk_reader: !EasyReader &id_disk_reader
  args:
    dataset_name: qqp

dataset: !FastListDataset &id_dataset
  args:
    device: cuda:0
    batchsize: 16
    model_string: bert-base-uncased
    seq_len: 128
  data_loader: *id_disk_reader
  prompt: True
  mapping: "{'0':'No','1':'Yes'}"
  template: "*cls**sent_0*?*mask*,*+sentl_1**sep+*"
  first_sent_limit: 120

probe_com: !NTKProbe &id_probe_com
  args:
    device: cuda:0
    seed: 2023
    dataset: qqp
    model: bert-base-uncased
    datadir: ./datasets
    savedir: ./ntks
    logdir: null
    workers_per_device: 1
    grad_chunksize: 1000000
    mm_col_chunksize: 20000
    loader_batch_size: 16
    loader_num_workers: 1
    pin_memory: False
    allow_tf32: False
    benchmark: False
    deterministic: True
    ntk_dtype: float32
    num_frozen_layers: 8
    debug: False
    prompt: True
    correction: False
    single_kernel: True
  num_labels: 2

dshap_com: !Fast_Data_Shapley
  dataset: *id_dataset
  probe_model: *id_probe_com
  num_metric: 2
