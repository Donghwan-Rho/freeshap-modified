disk_reader: !EasyReader &id_disk_reader
  args:
    dataset_name: ag_news

dataset: !FastListDataset &id_dataset
  args:
    device: cuda:0
    batchsize: 16
    model_string: bert-base-uncased
    seq_len: 128
  data_loader: *id_disk_reader
  prompt: True
  mapping: "{'0':'World','1':'Sports','2':'Business','3':'Technology'}"
  template: "*cls**sent_0*_This_is_about*mask*.*sep+*"
  first_sent_limit: 121

probe_com: !NTKProbe &id_probe_com
  args:
    device: cuda:0
    seed: 2023
    dataset: ag_news
    model: bert-base-uncased
    datadir: ./datasets
    savedir: ./ntks
    logdir: null
    workers_per_device: 1
    grad_chunksize: 300000
    mm_col_chunksize: 4000
    loader_batch_size: 16
    loader_num_workers: 0
    pin_memory: False
    allow_tf32: False
    benchmark: False
    deterministic: True
    ntk_dtype: float32
    num_frozen_layers: 8
    debug: False
    prompt: True
    correction: False
    single_kernel: True
  num_labels: 4

dshap_com: !Fast_Data_Shapley
  dataset: *id_dataset
  probe_model: *id_probe_com
  num_metric: 2
